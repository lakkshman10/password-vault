name: Java CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile source
        run: |
          mkdir -p out
          find src -name "*.java" > sources.txt
          javac -cp "$(echo ~/.m2/repository/com/google/code/gson/gson/*/gson-*.jar)" -d out @sources.txt

      - name: Run tests
        run: |
          find src/test -name "*.java" > test-sources.txt
          javac -cp "out:$(echo ~/.m2/repository/org/junit/jupiter/*/*/*.jar):$(echo ~/.m2/repository/com/google/code/gson/gson/*/gson-*.jar)" -d out @test-sources.txt
          java -jar ~/.m2/repository/org/junit/platform/junit-platform-console-standalone/*/junit-platform-console-standalone-*.jar -cp out --scan-classpath